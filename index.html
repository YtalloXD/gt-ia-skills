<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snake Game</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <h1>Snake</h1>
        <p class="score">Pontuação: <span id="score">0</span></p>
      </header>

      <section class="game-shell">
        <canvas
          id="gameCanvas"
          width="400"
          height="400"
          aria-label="Área de jogo da cobrinha"
        ></canvas>

        <div class="overlay" id="menuOverlay">
          <div class="card">
            <h2>Jogo da Cobrinha</h2>
            <p>Use as setas do teclado para jogar.</p>
            <button id="startButton" class="action">Começar</button>
          </div>
        </div>

        <div class="overlay hidden" id="gameOverOverlay">
          <div class="card">
            <h2>Fim de jogo</h2>
            <p>Pontuação final: <strong id="finalScore">0</strong></p>
            <button id="restartButton" class="action">Jogar novamente</button>
          </div>
        </div>

        <div class="overlay hidden" id="pauseOverlay">
          <div class="card">
            <h2>-Pausado-</h2>
            <p>Pressione ESC para continuar.</p>
          </div>
        </div>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
